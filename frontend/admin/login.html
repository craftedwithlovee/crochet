<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Access | Crafted with Love</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-page">

    <div class="login-card">

        <!-- Brand -->
        <div class="login-brand">
            <div class="login-logo" style="background: none; box-shadow: none;">
                <img src="/admin/assets/logo.png" alt="Crafted with Love" style="height: 68px; width: auto; border-radius: 16px; object-fit: contain;">
            </div>
            <h1 class="serif">Crafted with Love</h1>
            <p>Studio Administration</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="login-form" onsubmit="handleLogin(event)" novalidate>

            <div class="form-group">
                <label class="label-atelier">Studio Username</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Enter your username"
                    class="input-atelier">
            </div>

            <div class="form-group">
                <label class="label-atelier">Access Key</label>
                <div style="position: relative;">
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••"
                        class="input-atelier" style="padding-right: 46px;">
                    <button type="button" id="pwd-toggle" onclick="togglePwd()"
                        style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--warm-400); display:flex; align-items:center;">
                        <i data-lucide="eye" id="eye-icon" style="width:18px;height:18px;"></i>
                    </button>
                </div>
            </div>

            <div class="login-error" id="loginError"></div>

            <button type="submit" class="btn btn-atelier" id="login-btn"
                style="width:100%; justify-content:center; padding:14px; font-size:15px; border-radius:12px; margin-top:4px;">
                <i data-lucide="log-in"></i>
                Open Studio Portal
            </button>

        </form>

        <!-- Back Link -->
        <a href="/" class="login-back">
            <i data-lucide="arrow-left"></i>
            Back to Shop
        </a>

    </div>

    <script>
        lucide.createIcons();

        const IS_LOCAL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const API = IS_LOCAL ? window.location.origin : "https://craftedwithlove.onrender.com";

        let showingPwd = false;
        function togglePwd() {
            showingPwd = !showingPwd;
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            input.type = showingPwd ? 'text' : 'password';
            icon.setAttribute('data-lucide', showingPwd ? 'eye-off' : 'eye');
            lucide.createIcons();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('loginError');
            error.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-circle" style="width:16px;height:16px;animation:spin 1s linear infinite;"></i> Signing in…';
            lucide.createIcons();

            try {
                const res = await fetch(`${API}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Invalid credentials');
                localStorage.setItem('adminToken', data.access_token);
                window.location.href = '/admin/';
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="log-in"></i> Open Studio Portal';
                lucide.createIcons();
            }
        }
    </script>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
