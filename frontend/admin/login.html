<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Crafted with Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css?v=3.0">
</head>
<body class="login-body">
    <div class="login-card">
        <span class="login-logo">🧶</span>
        <h1 class="serif-heading login-title">Crafted with Love</h1>
        <p class="login-subtitle">Studio Dashboard</p>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; font-size: 11px; font-weight: 800; color: var(--pink-600); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Studio Username</label>
                <input type="text" id="username" class="input" placeholder="Enter username" required autocomplete="username">
            </div>
            <div style="margin-bottom: 28px; text-align: left;">
                <label style="display: block; font-size: 11px; font-weight: 800; color: var(--pink-600); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Access Key</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="input" placeholder="Enter password" required autocomplete="current-password">
                    <button type="button" onclick="togglePassword()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; opacity: 0.4;">👁️</button>
                </div>
            </div>
            
            <div id="loginError" style="color: #ef4444; font-size: 13px; font-weight: 700; margin-bottom: 20px; display: none;"></div>
            
            <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%; height: 52px; font-size: 16px;">
                <span id="btnText">Enter Studio</span>
                <span id="btnLoader" style="display: none;">⏳</span>
            </button>
        </form>
        
        <div style="margin-top: 32px; font-size: 13px;">
            <a href="/" style="color: var(--gray-400); text-decoration: none; font-weight: 700; transition: color 0.2s;" onmouseover="this.style.color='var(--pink-500)'" onmouseout="this.style.color='var(--gray-400)'">← Back to Storefront</a>
        </div>
    </div>

    <script>
        const IS_LOCAL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const API = IS_LOCAL ? window.location.origin : "https://craftedwithlove.onrender.com";

        // Redirect if already logged in
        if (localStorage.getItem('adminToken')) {
            fetch(`${API}/api/admin/me`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
            }).then(r => { if (r.ok) window.location.href = '/admin/'; });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            error.style.display = 'none';
            btnText.textContent = 'Verifying...';
            btnLoader.style.display = 'inline-block';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Access denied');

                localStorage.setItem('adminToken', data.access_token);
                window.location.href = '/admin/';
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
                btnText.textContent = 'Enter Studio';
                btnLoader.style.display = 'none';
                btn.disabled = false;
            }
        }

        function togglePassword() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
