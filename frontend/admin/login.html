<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Crafted with Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🧶</div>
                <h1 class="serif-heading">Crafted with Love</h1>
                <p class="login-subtitle">Admin Dashboard</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>
                </div>
                <div id="loginError" class="error-msg hidden"></div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>
            <div class="login-footer">
                <a href="/">← Back to Store</a>
            </div>
        </div>
    </div>

    <script>
        const IS_LOCAL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const API = IS_LOCAL ? window.location.origin : "https://crochet-store-4dh6.onrender.com";

        // Redirect if already logged in
        if (localStorage.getItem('adminToken')) {
            fetch(`${API}/api/admin/me`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
            }).then(r => { if (r.ok) window.location.href = '/admin/'; });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');

            error.classList.add('hidden');
            btnText.textContent = 'Signing in...';
            btnLoader.classList.remove('hidden');
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                localStorage.setItem('adminToken', data.access_token);
                window.location.href = '/admin/';
            } catch (err) {
                error.textContent = err.message;
                error.classList.remove('hidden');
                btnText.textContent = 'Sign In';
                btnLoader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function togglePassword() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
